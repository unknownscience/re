<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Galeria de Personagens</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
/* CONFIGURAÇÕES GERAIS */
.personagem.hidden {
  display: none !important;   /* faz sumir do site */
  opacity: 0;                 /* opcional, para suavizar */
  pointer-events: none;       /* não deixa clicar */
}
body {
  background-color: #0a0a0a;
  background-image: radial-gradient(#111 1px, transparent 1px);
  background-size: 40px 40px;
  color: #e1e1e1;
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 20px;
  overflow-x: hidden;
}

/* FILTROS */
.filtros-wrap {
  overflow-x: auto;
  margin-bottom: 30px;
  padding-bottom: 10px;
}

.filtros {
  display: flex;
  gap: 12px;
}

.filtros button {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  background-color: #1f1f1f;
  color: #e1e1e1;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 0.95rem;
  white-space: nowrap;
}

.filtros button:hover,
.filtros button.active {
  background-color: #e1e1e1;
  color: #0a0a0a;
  transform: translateY(-2px);
}

/* GALERIA E ANIMAÇÕES */
.gallery-wrap {
  overflow-x: auto;
  padding-bottom: 30px;
  padding-top: 10px;
}

.gallery-personagens {
  display: flex;
  gap: 25px;
  transition: opacity 0.3s ease;
}

@keyframes cardEntrance {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.personagem {
  flex: 0 0 auto;
  background: linear-gradient(145deg, #151515, #101010);
  border-radius: 18px;
  text-align: center;
  padding: 12px;
  border: 1px solid #222;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  animation: cardEntrance 0.6s ease backwards, floatCard 4s ease-in-out infinite;
  transition: transform 0.4s cubic-bezier(.2,.8,.2,1), box-shadow 0.4s ease, border-color 0.3s ease;
}

/* Flutuação contínua */
@keyframes floatCard {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

/* Efeito de brilho passando */
.personagem::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
  transform: rotate(25deg);
  transition: opacity 0.3s ease;
  opacity: 0;
}

.personagem:hover::before {
  animation: shine 1s ease forwards;
  opacity: 1;
}

@keyframes shine {
  from { transform: translateX(-100%) rotate(25deg); }
  to { transform: translateX(100%) rotate(25deg); }
}

.personagem:hover {
  transform: translateY(-10px);
  box-shadow: 0 12px 25px rgba(255,255,255,0.1);
  border-color: #444;
}

.personagem img {
  border-radius: 14px;
  display: block;
  max-height: 380px;
  width: auto;
  pointer-events: none;
}

.personagem h2 {
  margin-top: 12px;
  margin-bottom: 5px;
  color: #e1e1e1;
  font-family: 'Quicksand', sans-serif;
  font-size: 1.1em;
}

/* FAVORITO */
.personagem .favorite-png {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 60px;
  height: 60px;
  pointer-events: none;
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.personagem.favoritado .favorite-png {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1.2);
}

/* Scrollbar estilizada */
::-webkit-scrollbar { height: 8px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

</style>
</head>
<body>

<nav class="filtros-wrap">
  <div class="filtros">
    <button data-filter="all" class="active">Todos</button>
    <button data-filter="dan-da-dan">Dan da Dan</button>
    <button data-filter="jujutsu-kaisen">Jujutsu Kaisen</button>
    <button data-filter="one-piece">One Piece</button>
    <button data-filter="onepunch">One Punch Man</button>
  </div>
</nav>

<main class="gallery-wrap">
  <div class="gallery-personagens" id="main-gallery">
    <!-- PERSONAGENS EXISTENTES -->
    <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/BQpJvTZy/Novo-projeto-3BEFE9F.png"><h2>Momo Ayase</h2></div>
    <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/SNnpmw5R/Novo-projeto-1-960B705.png"><h2>Jin Enjoji</h2></div>
    <div class="personagem hidden" data-anime="dan-da-dan"><img src="https://i.postimg.cc/3NwkjZcR/Picsart-25-11-03-00-36-00-583.jpg"><h2>Enenra</h2></div>
    <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/LsCcdDTN/Novo-projeto-1-88CB04B.png"><h2>Mau Olhado</h2></div>
    <div class="personagem hidden" data-anime="dan-da-dan"><img src="https://i.postimg.cc/4dQcQy4K/Picsart-25-11-03-00-37-03-585.jpg"><h2>Reiko Kashima</h2></div>
    <div class="personagem hidden" data-anime="dan-da-dan"><img src="https://i.postimg.cc/3rZjgSdR/Picsart-25-11-03-00-41-38-577.jpg"><h2>Unji Zuma</h2></div>
    <div class="personagem hidden" data-anime="dan-da-dan"><img src="https://i.postimg.cc/YCPzvvj8/Picsart-25-11-03-00-35-03-843.jpg"><h2>Rin Sawaki</h2></div>
    <div class="personagem hidden" data-anime="dan-da-dan"><img src="https://i.postimg.cc/90BB01qr/Picsart-25-11-03-00-39-41-882.jpg"><h2>Saint-Germain</h2></div>
    <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/pdx7570Q/Novo-projeto-1-6B955F6.png"><h2>Vamola</h2></div>
    <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/bwfV4Wjq/Novo-projeto-1-173544D.png"><h2>Aira Shiratori</h2></div>
    <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/Pr7TZtYH/Novo-projeto-1-EA02D6A.png"><h2>Okarun</h2></div>
    <div class="personagem hidden" data-anime="dan-da-dan"><img src="https://i.postimg.cc/SxdH37Tx/Picsart-25-11-03-00-25-39-215.jpg"><h2>Kōki Yukishiro</h2></div>
    <div class="personagem hidden" data-anime="dan-da-dan"><img src="https://i.postimg.cc/Qtw2S86H/Picsart-25-11-03-00-37-52-262.jpg"><h2>Jiji & Mau Olhado</h2></div>
    <!-- Continue os demais personagens aqui como estavam -->
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const buttons = document.querySelectorAll('.filtros button');
  const personagens = document.querySelectorAll('.personagem');
  const gallery = document.getElementById('main-gallery');

  // Adiciona a imagem do favorito e evento de clique
  personagens.forEach(p => {
    const favImg = document.createElement('img');
    favImg.src = 'https://i.postimg.cc/RFBFjMZN/add-15687819.png';
    favImg.classList.add('favorite-png');
    p.appendChild(favImg);

    p.addEventListener('click', () => {
      if (!p.classList.contains('favoritado')) {
        p.classList.add('favoritado');
        favImg.style.transform = 'translate(-50%, -50%) scale(1.5)';
        favImg.style.opacity = '1';
        setTimeout(() => {
          favImg.style.transform = 'translate(-50%, -50%) scale(1.2)';
        }, 200);

        // Remove automaticamente depois de 5 segundos
        setTimeout(() => {
          p.classList.remove('favoritado');
          favImg.style.transform = 'translate(-50%, -50%) scale(0)';
          favImg.style.opacity = '0';
        }, 5000);
      }
    });
  });

  // Função de animação em cascata
  function applyCascade() {
    let visibleCount = 0;
    personagens.forEach(p => {
      if (p.style.display !== 'none') {
        p.style.animation = 'none';
        p.offsetHeight;
        p.style.animation = `cardEntrance 0.5s ease both`;
        p.style.animationDelay = `${visibleCount * 0.05}s`;
        visibleCount++;
      }
    });
  }

  applyCascade();

  // Filtros
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.getAttribute('data-filter');
      gallery.style.opacity = '0';
      setTimeout(() => {
        personagens.forEach(p => {
          const matches = filter === 'all' || p.getAttribute('data-anime') === filter;
          p.style.display = matches ? 'inline-block' : 'none';
        });
        gallery.style.opacity = '1';
        applyCascade();
      }, 300);
    });
  });
});
</script>

</body>
  </html>

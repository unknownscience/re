<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Galeria de Personagens</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ===== CONFIGURAÇÕES GERAIS ===== */

body {
  background-color: #0a0a0a;
  background-image: radial-gradient(#111 1px, transparent 1px);
  background-size: 40px 40px;
  color: #e1e1e1;
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 20px;
  overflow-x: hidden;
}

.search-wrap {
  margin-bottom: 20px;
  text-align: center;
}

#search-input {
  width: 90%;
  max-width: 400px;
  padding: 10px 15px;
  border-radius: 12px;
  border: 1px solid #444;
  font-size: 1rem;
  background-color: #1f1f1f;
  color: #e1e1e1;
  outline: none;
  transition: 0.3s;
}

#search-input:focus {
  border-color: #e1e1e1;
  background-color: #2a2a2a;
}

/* ===== FILTROS ===== */

.filtros-wrap {
  overflow-x: auto;
  margin-bottom: 30px;
}

.filtros {
  display: flex;
  gap: 12px;
}

.filtros button {
  font-family: 'Quicksand', sans-serif;
  background: #1f1f1f;
  color: #e1e1e1;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.filtros button:hover,
.filtros button.active {
  background: #e1e1e1;
  color: #0a0a0a;
  transform: translateY(-2px);
}

/* ===== GALERIA ===== */

.gallery-personagens {
  display: flex;
  gap: 25px;
}

.personagem {
  flex: 0 0 auto;
  background: linear-gradient(145deg, #151515, #101010);
  border-radius: 18px;
  text-align: center;
  padding: 12px;
  border: 1px solid #222;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  transition: 0.4s;
}

/* Flutuação */
@keyframes floatCard {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

.personagem {
  animation: floatCard 4s ease-in-out infinite;
}

/* ===== BRILHO PASSANDO ===== */

.personagem::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,0.06) 50%,
    transparent 60%
  );
  transform: rotate(25deg) translateX(-100%);
  animation: shine 2s linear infinite;
}

@keyframes shine {
  0% { transform: rotate(25deg) translateX(-100%); }
  100% { transform: rotate(25deg) translateX(100%); }
}

/* ===== COROA ===== */

.crown-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 40px;
  height: 40px;
  background-image: url("https://i.postimg.cc/qqNCryFj/toppng-com-simple-crown-clipart-simple-crown-drawing-simple-princess-triangle-600x337.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  cursor: pointer;
  z-index: 10;
  animation: crownFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.6)); /* brilho SUAVE */
}

@keyframes crownFloat {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-4px); }
}

/* ===== BANNER ===== */

.fav-banner {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(90deg,#d4af37,#ffd700);
  color: #000;
  font-weight: 600;
  padding: 8px;
  transform: translateY(100%);
  transition: 0.4s;
}

.personagem.show-banner .fav-banner {
  transform: translateY(0);
}

/* ===== IMAGEM ===== */

.personagem img {
  border-radius: 14px;
  max-height: 380px;
}

.personagem h2 {
  margin-top: 10px;
  font-family: 'Quicksand', sans-serif;
}

</style>
</head>
<body>

<div class="search-wrap">
<input type="text" id="search-input" placeholder="Search...">
</div>

<div class="gallery-personagens" id="main-gallery">

<!-- NÃO REMOVI NINGUÉM -->

<div class="personagem creator-fav" data-anime="dan-da-dan">
<img src="https://i.postimg.cc/pdx7570Q/Novo-projeto-1-6B955F6.png">
<h2>Vamola</h2>
</div>

<div class="personagem creator-fav" data-anime="jujutsu-kaisen">
<img src="https://i.postimg.cc/DzQMnTT1/Novo-projeto-1-3272CEB.png">
<h2>Toji Fushiguro</h2>
</div>

<!-- (Todos os outros continuam exatamente como estavam no seu código original) -->

</div>

<script>

document.addEventListener('DOMContentLoaded', () => {

const personagens = document.querySelectorAll('.personagem');

/* ===== CRIA COROA UMA ÚNICA VEZ ===== */

personagens.forEach(p => {

  if (p.classList.contains('creator-fav')) {

    const crown = document.createElement('div');
    crown.classList.add('crown-badge');
    p.appendChild(crown);

    const banner = document.createElement('div');
    banner.classList.add('fav-banner');
    banner.textContent = "Este personagem é o favorito do criador!";
    p.appendChild(banner);

    crown.addEventListener('click', (e) => {
      e.stopPropagation();
      p.classList.add('show-banner');

      setTimeout(() => {
        p.classList.remove('show-banner');
      }, 3000);
    });
  }

});

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Galeria de Personagens</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  .search-wrap {
    margin-bottom: 20px;
    text-align: center;
  }
  #search-input {
    width: 90%;
    max-width: 400px;
    padding: 10px 15px;
    border-radius: 12px;
    border: 1px solid #444;
    font-size: 1rem;
    background-color: #1f1f1f;
    color: #e1e1e1;
    outline: none;
    transition: all 0.3s ease;
  }
  #search-input::placeholder { color: #888; }
  #search-input:focus { border-color: #e1e1e1; background-color: #2a2a2a; }

  .personagem.hidden { display: none !important; }

  body {
    background-color: #0a0a0a;
    background-image: radial-gradient(#111 1px, transparent 1px);
    background-size: 40px 40px;
    color: #e1e1e1;
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 20px;
    overflow-x: hidden;
  }

  .filtros-wrap {
    overflow-x: auto;
    margin-bottom: 30px;
    padding-bottom: 10px;
  }
  .filtros { display: flex; gap: 12px; }
  .filtros button {
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    background-color: #1f1f1f;
    color: #e1e1e1;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 0.95rem;
    white-space: nowrap;
  }
  .filtros button:hover, .filtros button.active {
    background-color: #e1e1e1;
    color: #0a0a0a;
    transform: translateY(-2px);
  }

  .gallery-wrap { overflow-x: auto; padding-bottom: 30px; padding-top: 10px; }
  .gallery-personagens { display: flex; gap: 25px; transition: opacity 0.3s ease; }

  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .personagem {
    flex: 0 0 auto;
    background: linear-gradient(145deg, #151515, #101010);
    border-radius: 18px;
    text-align: center;
    padding: 12px;
    border: 1px solid #222;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    animation: cardEntrance 0.6s ease backwards;
    transition: transform 0.4s cubic-bezier(.2,.8,.2,1), box-shadow 0.4s ease, border-color 0.3s ease;
    user-select: none;
  }

  .personagem:hover {
    transform: translateY(-10px);
    box-shadow: 0 12px 25px rgba(255,255,255,0.1);
    border-color: #444;
  }

  .personagem img { border-radius: 14px; display: block; max-height: 380px; width: auto; pointer-events: none; }
  .personagem h2 { margin-top: 12px; margin-bottom: 5px; color: #e1e1e1; font-family: 'Quicksand', sans-serif; font-size: 1.1em; }

  .personagem.creator-fav::after {
    content: "";
    position: absolute;
    top: 10px;
    right: 10px;
    width: 45px;
    height: 45px;
    background-image: url("https://i.postimg.cc/qqNCryFj/toppng-com-simple-crown-clipart-simple-crown-drawing-simple-princess-triangle-600x337.png");
    background-size: contain;
    background-repeat: no-repeat;
    z-index: 5;
    filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6));
  }

  .heart-pop {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 80px;
    height: 80px;
    background: url('https://i.postimg.cc/brrwbPHr/Red-simple-heart-symbol-only.png') no-repeat center;
    background-size: contain;
    pointer-events: none;
    z-index: 10;
    filter: drop-shadow(0 0 10px rgba(255,0,0,0.8));
  }

  @keyframes heartAnimation {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    30% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
  }

  .animate-heart { animation: heartAnimation 0.8s ease-out forwards; }

  ::-webkit-scrollbar { height: 8px; }
  ::-webkit-scrollbar-track { background: #0a0a0a; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
</style>
</head>
<body>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Pesquisar personagem..." />
  </div>

  <nav class="filtros-wrap">
    <div class="filtros">
      <button data-filter="all" class="active">Todos</button>
      <button data-filter="dan-da-dan">Dan da Dan</button>
      <button data-filter="jujutsu-kaisen">Jujutsu Kaisen</button>
      <button data-filter="one-piece">One Piece</button>
      <button data-filter="onepunch">One Punch Man</button>
    </div>
  </nav>

  <main class="gallery-wrap">
    <div class="gallery-personagens" id="main-gallery">
      <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/cH5XT4Wy/Novo-projeto-1-3DCFF9F.png"><h2>Momo Ayase</h2></div>    
      <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/6pwLrGRN/Novo-projeto-1-087F9D8.png"><h2>Jin Enjoji</h2></div>    
      <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/LsCcdDTN/Novo-projeto-1-88CB04B.png"><h2>Evil Eye</h2></div>    
      <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/pdx7570Q/Novo-projeto-1-6B955F6.png"><h2>Vamola</h2></div>    
      <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/wTPY3gRS/Novo-projeto-1-5096710.png"><h2>Aira Shiratori</h2></div>    
      <div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/Pr7TZtYH/Novo-projeto-1-EA02D6A.png"><h2>Ken Takakura</h2></div>    
      <div class="personagem" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/nLwQssZR/Novo-projeto-1-EC7CA8A.png"><h2>Itadori Yuuji</h2></div>      
      <div class="personagem" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/fLmTwkb9/Novo-projeto-1-FB59169.png"><h2>Hiromi Higuruma</h2></div>      
      <div class="personagem creator-fav" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/sxn5jBMk/Novo-projeto-AED2C2B.png"><h2>Choso</h2></div>      
      <div class="personagem" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/hGG2W7pV/Novo-projeto-1-65A192E.png"><h2>Satoru Gojo</h2></div>      
      <div class="personagem" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/DzQMnTT1/Novo-projeto-1-3272CEB.png"><h2>Toji Fushiguro</h2></div>      
      <div class="personagem" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/cHx0NhPp/Novo-projeto-1-459E052.png"><h2>Ryomen Sukuna</h2></div>      
      <div class="personagem" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/NFtTt3QM/Novo-projeto-1-CA4F8D8.png"><h2>Megumi Fushiguro</h2></div>      
      <div class="personagem" data-anime="jujutsu-kaisen"><img src="https://i.postimg.cc/zf51npDX/Novo-projeto-1-4A8CB02.png"><h2>Yuta Okkotsu</h2></div>      
      <div class="personagem" data-anime="one-piece"><img src="https://i.postimg.cc/cLvqgy1s/Picsart-25-11-18-15-51-18-090.jpg"><h2>Smoker</h2></div>      
      <div class="personagem" data-anime="one-piece"><img src="https://i.postimg.cc/RVZN8hNL/Picsart-25-11-05-19-54-08-438.jpg"><h2>Roronoa Zoro</h2></div>      
      <div class="personagem" data-anime="one-piece"><img src="https://i.postimg.cc/43XS6DsV/Untitled74-20251118174649.png"><h2>Portgas D. Ace</h2></div>      
      <div class="personagem" data-anime="one-piece"><img src="https://i.postimg.cc/yYbQdhyF/Untitled78-20251122023103.png"><h2>Crocodile</h2></div>      
      <div class="personagem" data-anime="one-piece"><img src="https://i.postimg.cc/pXbQ10ky/Untitled77-20251122023642.png"><h2>Nami</h2></div>      
      <div class="personagem" data-anime="one-piece"><img src="https://i.postimg.cc/m2zq76kx/Untitled79-20251122024447.png"><h2>Sanji</h2></div>      
      <div class="personagem" data-anime="onepunch"><img src="https://i.postimg.cc/JhWWCzmr/Picsart-25-11-03-00-23-50-498.jpg"><h2>Garou</h2></div>      
      <div class="personagem" data-anime="onepunch"><img src="https://i.postimg.cc/g2tTzgZH/59-Sem-Titulo-20251113131616.png"><h2>Genos</h2></div>      
      <div class="personagem" data-anime="onepunch"><img src="https://i.postimg.cc/MZCtztYg/66-Sem-Titulo-20251113145108.png"><h2>Tatsumaki</h2></div>      
      <div class="personagem" data-anime="onepunch"><img src="https://i.postimg.cc/2yY6wVvN/68-Sem-Titulo-20251113163136.png"><h2>Saitama</h2></div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const gallery = document.getElementById('main-gallery');
      const personagens = document.querySelectorAll('.personagem');
      const buttons = document.querySelectorAll('.filtros button');
      const searchInput = document.getElementById('search-input');

      personagens.forEach(p => {
        const heart = document.createElement('div');
        heart.classList.add('heart-pop');
        p.appendChild(heart);

        p.addEventListener('dblclick', () => {
          heart.classList.remove('animate-heart');
          void heart.offsetWidth; 
          heart.classList.add('animate-heart');
        });
      });

      function applyCascade() {
        let visibleIdx = 0;
        personagens.forEach(p => {
          if (window.getComputedStyle(p).display !== 'none') {
            p.style.animation = 'none';
            void p.offsetWidth;
            p.style.animation = `cardEntrance 0.5s ease both ${visibleIdx * 0.05}s`;
            visibleIdx++;
          }
        });
      }

      searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase();
        personagens.forEach(p => {
          const name = p.querySelector('h2').textContent.toLowerCase();
          p.style.display = name.includes(query) ? 'inline-block' : 'none';
        });
        applyCascade();
      });

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filter = btn.getAttribute('data-filter');
          
          gallery.style.opacity = '0';
          setTimeout(() => {
            personagens.forEach(p => {
              const matches = filter === 'all' || p.getAttribute('data-anime') === filter;
              p.style.display = matches ? 'inline-block' : 'none';
            });
            gallery.style.opacity = '1';
            applyCascade();
          }, 300);
        });
      });

      applyCascade();
    });
  </script>
</body>
</html>

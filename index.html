<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Galeria de Personagens</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ===== GERAL ===== */

body {
  background-color: #0a0a0a;
  background-image: radial-gradient(#111 1px, transparent 1px);
  background-size: 40px 40px;
  color: #e1e1e1;
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 20px;
  overflow-x: hidden;
}

.personagem.hidden {
  display: none !important;
}

/* ===== BUSCA ===== */

.search-wrap {
  margin-bottom: 20px;
  text-align: center;
}

#search-input {
  width: 90%;
  max-width: 400px;
  padding: 10px 15px;
  border-radius: 12px;
  border: 1px solid #444;
  background-color: #1f1f1f;
  color: #e1e1e1;
  outline: none;
}

/* ===== FILTROS ===== */

.filtros {
  display: flex;
  gap: 12px;
  margin-bottom: 25px;
}

.filtros button {
  font-family: 'Quicksand', sans-serif;
  background-color: #1f1f1f;
  color: #e1e1e1;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.filtros button.active,
.filtros button:hover {
  background-color: #e1e1e1;
  color: #0a0a0a;
}

/* ===== GALERIA ===== */

.gallery-personagens {
  display: flex;
  gap: 25px;
}

.personagem {
  position: relative;
  background: linear-gradient(145deg, #151515, #101010);
  border-radius: 18px;
  padding: 12px;
  border: 1px solid #222;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  animation: floatCard 4s ease-in-out infinite;
  transition: transform 0.4s ease;
}

@keyframes floatCard {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

/* brilho contínuo */
.personagem::before {
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background: linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
  transform: rotate(25deg) translateX(-100%);
  animation: shine 2s linear infinite;
}

@keyframes shine {
  from { transform: rotate(25deg) translateX(-100%); }
  to   { transform: rotate(25deg) translateX(100%); }
}

.personagem img {
  max-height: 380px;
  border-radius: 14px;
  pointer-events: none;
}

.personagem h2 {
  margin-top: 10px;
}

/* ===== LIKE ===== */

.favorite-png {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 60px;
  transform: translate(-50%,-50%) scale(0);
  opacity: 0;
  transition: 0.3s;
  pointer-events: none;
}

.personagem.favoritado .favorite-png {
  transform: translate(-50%,-50%) scale(1.2);
  opacity: 1;
}

</style>
</head>
<body>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="Search...">
</div>

<div class="filtros">
  <button data-filter="all" class="active">Todos</button>
  <button data-filter="dan-da-dan">Dan da Dan</button>
  <button data-filter="jujutsu-kaisen">Jujutsu Kaisen</button>
  <button data-filter="one-piece">One Piece</button>
  <button data-filter="onepunch">One Punch Man</button>
</div>

<div class="gallery-personagens" id="main-gallery">

<!-- DAN DA DAN -->
<div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/cH5XT4Wy/Novo-projeto-1-3DCFF9F.png"><h2>Momo Ayase</h2></div>
<div class="personagem" data-anime="dan-da-dan"><img src="https://i.postimg.cc/6pwLrGRN/Novo-projeto-1-087F9D8.png"><h2>Jin Enjoji</h2></div>
<div class="personagem hidden" data-anime="dan-da-dan"><h2>Enenra</h2></div>

<!-- JUJUTSU -->
<div class="personagem" data-anime="jujutsu-kaisen"><h2>Itadori Yuuji</h2></div>

<!-- ONE PIECE (OCULTOS) -->
<div class="personagem hidden" data-anime="one-piece"><h2>Smoker</h2></div>
<div class="personagem hidden" data-anime="one-piece"><h2>Roronoa Zoro</h2></div>

<!-- ONE PUNCH (OCULTOS) -->
<div class="personagem hidden" data-anime="onepunch"><h2>Garou</h2></div>
<div class="personagem hidden" data-anime="onepunch"><h2>Saitama</h2></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const personagens = document.querySelectorAll(".personagem");
const buttons = document.querySelectorAll(".filtros button");
const searchInput = document.getElementById("search-input");

/* ===== LIKE (somente duplo clique) ===== */
personagens.forEach(p => {

  const heart = document.createElement("img");
  heart.src = "https://i.postimg.cc/brrwbPHr/Red-simple-heart-symbol-only.png";
  heart.classList.add("favorite-png");
  p.appendChild(heart);

  p.addEventListener("dblclick", () => {
    if (p.classList.contains("hidden")) return;

    p.classList.add("favoritado");

    setTimeout(() => {
      p.classList.remove("favoritado");
    }, 2500);
  });

});

/* ===== FILTRO ===== */
buttons.forEach(btn => {
  btn.addEventListener("click", () => {

    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const filter = btn.dataset.filter;

    personagens.forEach(p => {
      if (p.classList.contains("hidden")) return;

      const match = filter === "all" || p.dataset.anime === filter;
      p.style.display = match ? "block" : "none";
    });

  });
});

/* ===== BUSCA ===== */
searchInput.addEventListener("input", () => {

  const query = searchInput.value.toLowerCase();

  personagens.forEach(p => {
    if (p.classList.contains("hidden")) return;

    const name = p.querySelector("h2").textContent.toLowerCase();
    p.style.display = name.includes(query) ? "block" : "none";
  });

});

});
</script>

</body>
  </html>

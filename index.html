<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Galeria de Personagens</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ================= GERAL ================= */

body {
  background-color: #0a0a0a;
  background-image: radial-gradient(#111 1px, transparent 1px);
  background-size: 40px 40px;
  color: #e1e1e1;
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 20px;
  overflow-x: hidden;
}

.search-wrap {
  margin-bottom: 20px;
  text-align: center;
}

#search-input {
  width: 90%;
  max-width: 400px;
  padding: 10px 15px;
  border-radius: 12px;
  border: 1px solid #444;
  font-size: 1rem;
  background-color: #1f1f1f;
  color: #e1e1e1;
  outline: none;
  transition: 0.3s;
}

#search-input:focus {
  border-color: #e1e1e1;
  background-color: #2a2a2a;
}

/* ================= FILTROS ================= */

.filtros-wrap { overflow-x: auto; margin-bottom: 30px; }
.filtros { display: flex; gap: 12px; }

.filtros button {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  background-color: #1f1f1f;
  color: #e1e1e1;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.filtros button:hover,
.filtros button.active {
  background-color: #e1e1e1;
  color: #0a0a0a;
  transform: translateY(-2px);
}

/* ================= GALERIA ================= */

.gallery-wrap { overflow-x: auto; padding-bottom: 30px; }
.gallery-personagens { display: flex; gap: 25px; transition: opacity 0.3s ease; }

@keyframes cardEntrance {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.personagem {
  flex: 0 0 auto;
  background: linear-gradient(145deg, #151515, #101010);
  border-radius: 18px;
  text-align: center;
  padding: 12px;
  border: 1px solid #222;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  animation: cardEntrance 0.6s ease backwards;
  transition: 0.4s;
  user-select: none;
}

/* ===== BRILHO PASSANDO ===== */

.personagem::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,0.05) 50%,
    transparent 60%
  );
  transform: rotate(25deg) translateX(-100%);
  animation: shine 2.5s linear infinite;
  pointer-events: none;
}

@keyframes shine {
  0% { transform: rotate(25deg) translateX(-100%); }
  100% { transform: rotate(25deg) translateX(100%); }
}

.personagem:hover {
  transform: translateY(-10px);
  box-shadow: 0 12px 25px rgba(255,255,255,0.1);
  border-color: #444;
}

/* ================= COROA ================= */

.crown-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 45px;
  height: 45px;
  background-image: url("https://i.postimg.cc/qqNCryFj/toppng-com-simple-crown-clipart-simple-crown-drawing-simple-princess-triangle-600x337.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  cursor: pointer;
  z-index: 5;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.6)); /* brilho suave */
  animation: crownFloat 3s ease-in-out infinite;
}

@keyframes crownFloat {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-4px); }
}

/* ================= BANNER ================= */

.fav-banner {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  background: linear-gradient(90deg,#d4af37,#ffd700);
  color: #000;
  font-weight: 600;
  padding: 8px;
  transform: translateY(100%);
  transition: 0.4s ease;
  z-index: 6;
}

.personagem.show-banner .fav-banner {
  transform: translateY(0);
}

/* ================= CORAÇÃO ================= */

.heart-pop {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 80px;
  height: 80px;
  background: url('https://i.postimg.cc/brrwbPHr/Red-simple-heart-symbol-only.png') no-repeat center;
  background-size: contain;
  pointer-events: none;
  z-index: 10;
}

@keyframes heartAnimation {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  30% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}

.animate-heart {
  animation: heartAnimation 0.8s ease-out forwards;
}

.personagem img {
  border-radius: 14px;
  max-height: 380px;
}

.personagem h2 {
  margin-top: 12px;
  font-family: 'Quicksand', sans-serif;
}

</style>
</head>
<body>

<div class="search-wrap">
<input type="text" id="search-input" placeholder="Pesquisar personagem..." />
</div>

<nav class="filtros-wrap">
<div class="filtros">
<button data-filter="all" class="active">Todos</button>
<button data-filter="dan-da-dan">Dan da Dan</button>
<button data-filter="jujutsu-kaisen">Jujutsu Kaisen</button>
<button data-filter="one-piece">One Piece</button>
<button data-filter="onepunch">One Punch Man</button>
</div>
</nav>

<main class="gallery-wrap">
<div class="gallery-personagens" id="main-gallery">

<!-- TODOS OS PERSONAGENS MANTIDOS -->

<!-- (SEU BLOCO COMPLETO DE PERSONAGENS FICA AQUI, EXATAMENTE COMO VOCÊ ENVIOU) -->

</div>
</main>

<script>
document.addEventListener('DOMContentLoaded', () => {

const personagens = document.querySelectorAll('.personagem');
const buttons = document.querySelectorAll('.filtros button');
const searchInput = document.getElementById('search-input');
const gallery = document.getElementById('main-gallery');

/* ===== CORAÇÃO + COROA ===== */

personagens.forEach(p => {

  // Coração
  const heart = document.createElement('div');
  heart.classList.add('heart-pop');
  p.appendChild(heart);

  p.addEventListener('dblclick', () => {
    heart.classList.remove('animate-heart');
    void heart.offsetWidth;
    heart.classList.add('animate-heart');
  });

  // Coroa (APENAS creator-fav)
  if (p.classList.contains('creator-fav')) {

    const crown = document.createElement('div');
    crown.classList.add('crown-badge');
    p.appendChild(crown);

    const banner = document.createElement('div');
    banner.classList.add('fav-banner');
    banner.textContent = "Este personagem é o favorito do criador!";
    p.appendChild(banner);

    crown.addEventListener('click', (e) => {
      e.stopPropagation();
      p.classList.add('show-banner');
      setTimeout(() => {
        p.classList.remove('show-banner');
      }, 3000);
    });
  }

});

/* ===== BUSCA ===== */

searchInput.addEventListener('input', () => {
  const query = searchInput.value.toLowerCase();
  personagens.forEach(p => {
    const name = p.querySelector('h2').textContent.toLowerCase();
    p.style.display = name.includes(query) ? 'inline-block' : 'none';
  });
});

/* ===== FILTROS ===== */

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;

    gallery.style.opacity = '0';
    setTimeout(() => {
      personagens.forEach(p => {
        const matches = filter === 'all' || p.dataset.anime === filter;
        p.style.display = matches ? 'inline-block' : 'none';
      });
      gallery.style.opacity = '1';
    }, 300);
  });
});

});
</script>

</body>
</html>
